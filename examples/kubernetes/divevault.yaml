apiVersion: v1
kind: ConfigMap
metadata:
  name: divevault-config
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  STARTUP_MIGRATIONS: "disabled"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_CLI_REQUEST_PER_WINDOW: "30"
  RATE_LIMIT_CLI_APPROVE_PER_WINDOW: "15"
  RATE_LIMIT_BACKUP_IMPORT_PER_WINDOW: "10"
  RATE_LIMIT_DIVE_UPLOAD_PER_WINDOW: "120"
---
apiVersion: v1
kind: Secret
metadata:
  name: divevault-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://dive:dive@postgres:5432/dive"
  VITE_CLERK_PUBLISHABLE_KEY: "pk_live_replace_me"
  CLERK_SECRET_KEY: "sk_live_replace_me"
  CLERK_FRONTEND_API_URL: "https://your-instance.clerk.accounts.dev"
  CLERK_JWKS_URL: ""
  CLERK_JWT_KEY: ""
  CLERK_AUTHORIZED_PARTIES: "https://app.example.com"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: divevault-db-migrate
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/your-org/divevault:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "migrations.migrate_postgres_schema"]
          envFrom:
            - configMapRef:
                name: divevault-config
            - secretRef:
                name: divevault-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: divevault-backend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: divevault-backend
  template:
    metadata:
      labels:
        app: divevault-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/your-org/divevault:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: divevault-config
            - secretRef:
                name: divevault-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: divevault-backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: divevault-backend
---
apiVersion: v1
kind: Service
metadata:
  name: divevault-backend
spec:
  selector:
    app: divevault-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
