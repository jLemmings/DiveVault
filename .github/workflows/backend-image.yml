name: Backend Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SOURCE_ARTIFACT_NAME: repo-source
  IMAGE_ARTIFACT_NAME: docker-image
  LOCAL_IMAGE_TAG: divevault-ci:${{ github.sha }}
  FULL_APP_BASE_URL: http://127.0.0.1:8000
  PYTHON_VERSION: "3.14.5"
  NODE_VERSION: "24.18.0"

jobs:
  fetch-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      publish_version_tags: ${{ steps.version.outputs.publish_version_tags }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      image_repository: ${{ steps.version.outputs.image_repository }}
      tags: ${{ steps.version.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version and tags
        id: version
        env:
          IMAGE_REPOSITORY: ${{ format('{0}/{1}/{2}', env.REGISTRY, github.repository_owner, github.event.repository.name) }}
        run: |
          set -euo pipefail

          PACKAGE_FILE="frontend/package.json"
          if [[ ! -f "${PACKAGE_FILE}" ]]; then
            echo "Missing ${PACKAGE_FILE} file." >&2
            exit 1
          fi

          BASE_VERSION="$(
            python -c 'import json, pathlib; print(json.loads(pathlib.Path("frontend/package.json").read_text(encoding="utf-8"))["version"].strip())'
          )"
          if [[ -z "${BASE_VERSION}" ]]; then
            echo "${PACKAGE_FILE} must contain a version." >&2
            exit 1
          fi

          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '${BASE_VERSION}' in ${PACKAGE_FILE}. Use semver such as 0.1.0 or 0.2.0-beta1." >&2
            exit 1
          fi

          IMAGE_REPOSITORY="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          RELEASE_TAG="v${BASE_VERSION}"
          VERSION_TAG="v${BASE_VERSION}-${GITHUB_SHA::7}"
          PUBLISH_VERSION_TAGS="false"
          IMAGE_TAGS=(
            "${IMAGE_REPOSITORY}:${VERSION_TAG}"
          )

          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            PUBLISH_VERSION_TAGS="true"
          fi

          if [[ "${PUBLISH_VERSION_TAGS}" == "true" ]]; then
            VERSION_TAG="${RELEASE_TAG}"
            IMAGE_TAGS=(
              "${IMAGE_REPOSITORY}:${VERSION_TAG}"
              "${IMAGE_REPOSITORY}:stable"
              "${IMAGE_REPOSITORY}:latest"
            )
          fi

          {
            echo "base_version=${BASE_VERSION}"
            echo "publish_version_tags=${PUBLISH_VERSION_TAGS}"
            echo "version_tag=${VERSION_TAG}"
            echo "image_repository=${IMAGE_REPOSITORY}"
            echo "tags<<EOF"
            printf '%s\n' "${IMAGE_TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Package source artifact
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.pytest_cache' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/playwright-report' \
            --exclude='frontend/test-results' \
            -czf "${RUNNER_TEMP}/repo-source.tar.gz" .

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/repo-source.tar.gz
          if-no-files-found: error

  quality-gate:
    runs-on: ubuntu-latest
    needs: fetch-artifacts

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Extract source artifact
        run: |
          set -euo pipefail
          tar -xzf "${RUNNER_TEMP}/artifacts/repo-source.tar.gz" -C "${GITHUB_WORKSPACE}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          npx playwright --version
          npx playwright install --with-deps

      - name: Run backend test suite
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python -m pytest -vv -ra backend/tests

      - name: Check backend syntax
        run: python -m compileall backend

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Check frontend structure
        working-directory: frontend
        run: npm run check:structure

      - name: Check API contract coverage
        working-directory: frontend
        run: npm run check:contracts

      - name: Run frontend tests and build
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: npm run build

  build-image:
    runs-on: ubuntu-latest
    needs:
      - fetch-artifacts
      - quality-gate

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Extract source artifact
        run: |
          set -euo pipefail
          tar -xzf "${RUNNER_TEMP}/artifacts/repo-source.tar.gz" -C "${GITHUB_WORKSPACE}"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend release assets
        working-directory: frontend
        run: npm run build:app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image artifact
        uses: docker/build-push-action@v7
        with:
          file: backend/Dockerfile
          platforms: linux/amd64
          pull: true
          push: false
          tags: ${{ env.LOCAL_IMAGE_TAG }}
          outputs: type=docker,dest=${{ runner.temp }}/divevault-image.tar
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.fetch-artifacts.outputs.version_tag }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/divevault-image.tar
          if-no-files-found: error

  test-built-image:
    runs-on: ubuntu-latest
    needs:
      - fetch-artifacts
      - build-image

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Extract source artifact
        run: |
          set -euo pipefail
          tar -xzf "${RUNNER_TEMP}/artifacts/repo-source.tar.gz" -C "${GITHUB_WORKSPACE}"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          npx playwright --version
          npx playwright install --with-deps

      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Load Docker image
        run: docker load --input "${RUNNER_TEMP}/artifacts/divevault-image.tar"

      - name: Start image test stack
        run: |
          set -euo pipefail
          docker network create divevault-full-app-test
          docker run --detach --name divevault-postgres --network divevault-full-app-test \
            --env POSTGRES_USER=dive \
            --env POSTGRES_PASSWORD=dive \
            --env POSTGRES_DB=dive \
            postgres:17

          for attempt in {1..60}; do
            if docker exec divevault-postgres pg_isready -U dive -d dive; then
              break
            fi
            if [[ "${attempt}" == "60" ]]; then
              docker logs divevault-postgres >&2 || true
              exit 1
            fi
            sleep 2
          done

          docker run --detach --name divevault-backend --network divevault-full-app-test \
            --publish 127.0.0.1:8000:8000 \
            --env DATABASE_URL=postgresql://dive:dive@divevault-postgres:5432/dive \
            --env AUTH_JWT_SECRET=full-application-test-secret \
            --env AUTH_JWT_ISSUER=divevault.full-application-test \
            --env AUTH_JWT_AUDIENCE=divevault.full-application-test \
            --env STARTUP_MIGRATIONS=enabled \
            --env FRONTEND_DIR=/app/frontend/dist \
            --env HOST=0.0.0.0 \
            --env PORT=8000 \
            --env CORS_ORIGIN=http://127.0.0.1:8000 \
            --env DB_POOL_SIZE=0 \
            --env METRICS_ENABLED=disabled \
            "${LOCAL_IMAGE_TAG}"

      - name: Wait for image test stack
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS "${FULL_APP_BASE_URL}/health"; then
              exit 0
            fi
            sleep 2
          done
          docker logs divevault-backend >&2 || true
          exit 1

      - name: Run full application test against built image
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          FULL_APP_BASE_URL: ${{ env.FULL_APP_BASE_URL }}
        run: npm run test:full-app

      - name: Stop image test stack
        if: always()
        run: |
          docker logs divevault-backend > "${RUNNER_TEMP}/divevault-backend.log" 2>&1 || true
          docker logs divevault-postgres > "${RUNNER_TEMP}/divevault-postgres.log" 2>&1 || true
          docker rm -f divevault-backend divevault-postgres || true
          docker network rm divevault-full-app-test || true

      - name: Upload full application diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: built-image-full-application-diagnostics
          path: |
            ${{ runner.temp }}/divevault-backend.log
            ${{ runner.temp }}/divevault-postgres.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  publish:
    runs-on: ubuntu-latest
    needs:
      - fetch-artifacts
      - test-built-image
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      packages: write
    outputs:
      published_image_tag: ${{ steps.publish-tags.outputs.published_image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Load Docker image
        run: docker load --input "${RUNNER_TEMP}/artifacts/divevault-image.tar"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image tags
        id: publish-tags
        env:
          TAGS: ${{ needs.fetch-artifacts.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag=""
          while IFS= read -r tag; do
            if [[ -z "${tag}" ]]; then
              continue
            fi
            if [[ -z "${first_tag}" ]]; then
              first_tag="${tag}"
            fi
            docker tag "${LOCAL_IMAGE_TAG}" "${tag}"
            docker push "${tag}"
          done <<< "${TAGS}"
          if [[ -z "${first_tag}" ]]; then
            echo "No image tags were resolved for publishing." >&2
            exit 1
          fi
          echo "published_image_tag=${first_tag}" >> "${GITHUB_OUTPUT}"

  test-published-image:
    runs-on: ubuntu-latest
    needs:
      - fetch-artifacts
      - publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Extract source artifact
        run: |
          set -euo pipefail
          tar -xzf "${RUNNER_TEMP}/artifacts/repo-source.tar.gz" -C "${GITHUB_WORKSPACE}"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          npx playwright --version
          npx playwright install --with-deps

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published Docker image
        env:
          PUBLISHED_IMAGE_TAG: ${{ needs.publish.outputs.published_image_tag }}
        run: docker pull "${PUBLISHED_IMAGE_TAG}"

      - name: Start published image test stack
        env:
          PUBLISHED_IMAGE_TAG: ${{ needs.publish.outputs.published_image_tag }}
        run: |
          set -euo pipefail
          docker network create divevault-published-full-app-test
          docker run --detach --name divevault-published-postgres --network divevault-published-full-app-test \
            --env POSTGRES_USER=dive \
            --env POSTGRES_PASSWORD=dive \
            --env POSTGRES_DB=dive \
            postgres:17

          for attempt in {1..60}; do
            if docker exec divevault-published-postgres pg_isready -U dive -d dive; then
              break
            fi
            if [[ "${attempt}" == "60" ]]; then
              docker logs divevault-published-postgres >&2 || true
              exit 1
            fi
            sleep 2
          done

          docker run --detach --name divevault-published-backend --network divevault-published-full-app-test \
            --publish 127.0.0.1:8000:8000 \
            --env DATABASE_URL=postgresql://dive:dive@divevault-published-postgres:5432/dive \
            --env AUTH_JWT_SECRET=full-application-test-secret \
            --env AUTH_JWT_ISSUER=divevault.full-application-test \
            --env AUTH_JWT_AUDIENCE=divevault.full-application-test \
            --env STARTUP_MIGRATIONS=enabled \
            --env FRONTEND_DIR=/app/frontend/dist \
            --env HOST=0.0.0.0 \
            --env PORT=8000 \
            --env CORS_ORIGIN=http://127.0.0.1:8000 \
            --env DB_POOL_SIZE=0 \
            --env METRICS_ENABLED=disabled \
            "${PUBLISHED_IMAGE_TAG}"

      - name: Wait for published image test stack
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS "${FULL_APP_BASE_URL}/health"; then
              exit 0
            fi
            sleep 2
          done
          docker logs divevault-published-backend >&2 || true
          exit 1

      - name: Run full application test against published image
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          FULL_APP_BASE_URL: ${{ env.FULL_APP_BASE_URL }}
        run: npm run test:full-app

      - name: Stop published image test stack
        if: always()
        run: |
          docker logs divevault-published-backend > "${RUNNER_TEMP}/divevault-published-backend.log" 2>&1 || true
          docker logs divevault-published-postgres > "${RUNNER_TEMP}/divevault-published-postgres.log" 2>&1 || true
          docker rm -f divevault-published-backend divevault-published-postgres || true
          docker network rm divevault-published-full-app-test || true

      - name: Upload published image full application diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: published-image-full-application-diagnostics
          path: |
            ${{ runner.temp }}/divevault-published-backend.log
            ${{ runner.temp }}/divevault-published-postgres.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    needs:
      - fetch-artifacts
      - test-published-image
    if: needs.fetch-artifacts.outputs.publish_version_tags == 'true'
    permissions:
      contents: write

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.fetch-artifacts.outputs.version_tag }}
          name: ${{ needs.fetch-artifacts.outputs.version_tag }}
          generate_release_notes: true
          make_latest: true
          files: ${{ runner.temp }}/artifacts/repo-source.tar.gz
