name: Backend Image

on:
  push:
    branches:
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -vv -ra tests

      - name: Set up Docker Buildx
        if: github.event_name == 'release' || github.ref == 'refs/heads/master'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name == 'release' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version and tags
        if: github.event_name == 'release' || github.ref == 'refs/heads/master'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RELEASE_ID: ${{ github.event.release.id }}
          CURRENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          IMAGE_REPOSITORY: ${{ format('{0}/{1}/{2}', env.REGISTRY, github.repository_owner, github.event.repository.name) }}
        run: |
          set -euo pipefail

          VERSION_FILE="VERSION"
          if [[ ! -f "${VERSION_FILE}" ]]; then
            echo "Missing ${VERSION_FILE} file." >&2
            exit 1
          fi

          BASE_VERSION="$(tr -d '[:space:]' < "${VERSION_FILE}")"
          if [[ -z "${BASE_VERSION}" ]]; then
            echo "${VERSION_FILE} must contain a version." >&2
            exit 1
          fi

          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '${BASE_VERSION}' in ${VERSION_FILE}. Use semver such as 0.1.0 or 0.2.0-beta1." >&2
            exit 1
          fi

          IMAGE_REPOSITORY="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG=""
          IMAGE_TAGS=()

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            EXPECTED_TAG="v${BASE_VERSION}"
            if [[ "${CURRENT_RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
              echo "Release tag '${CURRENT_RELEASE_TAG}' does not match ${VERSION_FILE} value '${BASE_VERSION}'. Expected tag '${EXPECTED_TAG}'." >&2
              exit 1
            fi

            DUPLICATE_RELEASE_COUNT="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq "[.[] | select(.tag_name == \"${EXPECTED_TAG}\" and (.id | tostring) != \"${CURRENT_RELEASE_ID}\")] | length")"
            if [[ "${DUPLICATE_RELEASE_COUNT}" != "0" ]]; then
              echo "Duplicate release version '${BASE_VERSION}' detected. Bump ${VERSION_FILE} before publishing another release." >&2
              exit 1
            fi

            VERSION_TAG="${BASE_VERSION}"
            IMAGE_TAGS+=("${IMAGE_REPOSITORY}:${VERSION_TAG}")
            IMAGE_TAGS+=("${IMAGE_REPOSITORY}:stable")
          else
            VERSION_TAG="${BASE_VERSION}-${GITHUB_RUN_NUMBER}"
            IMAGE_TAGS+=("${IMAGE_REPOSITORY}:${VERSION_TAG}")
            IMAGE_TAGS+=("${IMAGE_REPOSITORY}:latest")
          fi

          {
            echo "base_version=${BASE_VERSION}"
            echo "version_tag=${VERSION_TAG}"
            echo "image_repository=${IMAGE_REPOSITORY}"
            echo "tags<<EOF"
            printf '%s\n' "${IMAGE_TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        if: github.event_name == 'release' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version_tag }}
