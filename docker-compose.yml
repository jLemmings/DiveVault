version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: dive
      POSTGRES_USER: dive
      POSTGRES_PASSWORD: dive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dive:dive@postgres:5432/dive
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGIN: "*"
      FRONTEND_DIR: frontend
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./dive_backend.py:/app/dive_backend.py
      - ./postgres_store.py:/app/postgres_store.py
      - ./frontend:/app/frontend

volumes:
  postgres-data:
