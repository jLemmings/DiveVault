services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: dive
      POSTGRES_USER: dive
      POSTGRES_PASSWORD: dive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dive:dive@postgres:5432/dive
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGIN: http://localhost:5173
      FRONTEND_DIR: frontend/dist
      MAX_JSON_BODY_BYTES: 1048576
      MAX_LIST_LIMIT: 200
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_CLI_REQUEST_PER_WINDOW: 30
      RATE_LIMIT_CLI_APPROVE_PER_WINDOW: 15
      RATE_LIMIT_BACKUP_IMPORT_PER_WINDOW: 10
      RATE_LIMIT_DIVE_UPLOAD_PER_WINDOW: 120
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-http://localhost:8000,http://localhost:5173}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend/divevault:/app/backend/divevault
      - ./backend/migrations:/app/backend/migrations

volumes:
  postgres-data:
