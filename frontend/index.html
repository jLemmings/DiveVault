<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiveVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#001525",
            surface: "#001525",
            "surface-bright": "#233b50",
            "surface-dim": "#001525",
            "surface-variant": "#1f374b",
            "surface-container": "#062135",
            "surface-container-low": "#021d30",
            "surface-container-lowest": "#000f1d",
            "surface-container-high": "#132c40",
            "surface-container-highest": "#1f374b",
            primary: "#9ccaff",
            "primary-container": "#001a31",
            secondary: "#b3cad6",
            "secondary-container": "#374c56",
            tertiary: "#ffb77d",
            "tertiary-container": "#2b1300",
            "tertiary-fixed": "#ffdcc3",
            "tertiary-fixed-dim": "#ffb77d",
            outline: "#8d9197",
            "outline-variant": "#43474c",
            "on-background": "#cde5ff",
            "on-surface": "#cde5ff",
            "on-surface-variant": "#c3c7cd",
            "on-primary": "#003257",
            "on-secondary": "#1e333d",
            "on-secondary-container": "#a5bcc8",
            "on-tertiary": "#4d2600",
            error: "#ffb4ab",
            "error-container": "#93000a",
            "on-error-container": "#ffdad6"
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Manrope", "sans-serif"],
            label: ["Space Grotesk", "sans-serif"]
          },
          boxShadow: {
            panel: "0 20px 40px rgba(0, 15, 29, 0.32)"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background text-on-background selection:bg-primary/30 selection:text-primary">
  <div id="app" class="min-h-screen"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/core.js"></script>
  <script src="/components/login.js"></script>
  <script src="/components/dashboard.js"></script>
  <script src="/components/logs.js"></script>
  <script src="/components/imports.js"></script>
  <script src="/components/dive-detail.js"></script>
  <script src="/components/equipment.js"></script>
  <script src="/components/settings.js"></script>
  <script src="/app.js"></script>
</body>
</html>
