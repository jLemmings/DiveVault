apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dive-backend.fullname" . }}
  labels:
    {{- include "dive-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dive-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dive-backend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dive-backend.serviceAccountName" . }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "dive-backend.databaseSecretName" . }}
                  key: {{ .Values.database.secretKey }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.env.corsOrigin | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
