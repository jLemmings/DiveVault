{{- if and .Values.ingress.enabled .Values.traefikIngressRoute.enabled }}
{{- fail "Only one of ingress.enabled or traefikIngressRoute.enabled may be true" }}
{{- end }}
{{- if and .Values.traefikIngressRoute.enabled (not .Values.ingress.enabled) }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "dive-backend.fullname" . }}
  labels:
    {{- include "dive-backend.labels" . | nindent 4 }}
  {{- with .Values.traefikIngressRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.traefikIngressRoute.entryPoints | nindent 4 }}
  routes:
    {{- range .Values.traefikIngressRoute.routes }}
    - match: {{ .match | quote }}
      kind: {{ default "Rule" .kind }}
      {{- with .middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- if .namespace }}
          namespace: {{ .namespace }}
          {{- end }}
        {{- end }}
      {{- end }}
      services:
        {{- range .services }}
        - name: {{ default (include "dive-backend.fullname" $) .name }}
          port: {{ default $.Values.service.port .port }}
          {{- if .scheme }}
          scheme: {{ .scheme }}
          {{- end }}
        {{- end }}
    {{- end }}
  {{- with .Values.traefikIngressRoute.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
